name: Squishy Bot

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests

      - name: Run bot
        run: python bot.py

      - name: Commit seen.json
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json
          git commit -m "update seen" || echo "no changes"
          git push
