name: Squishy Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 IMPORTANT (fixes push conflicts)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure seen.json exists
        run: |
          if [ ! -f seen.json ]; then
            echo "[]" > seen.json
          fi

      - name: Run bot
        run: python bot.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      # 🔥 FIXED GIT SYNC SECTION
      - name: Commit and sync seen.json
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"

          git add seen.json || true
          git commit -m "update seen" || echo "no changes"

          git pull --rebase origin main || true
          git push origin HEAD:main